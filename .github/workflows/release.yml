name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  COSMO: ${{ github.workspace }}/cosmocc

permissions:
  contents: write

jobs:
  build:
    name: Build APE binary (Cosmopolitan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download cosmocc toolchain
        run: |
          mkdir -p "$COSMO"
          wget -q -O /tmp/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
          unzip -q /tmp/cosmocc.zip -d "$COSMO"

      - name: Install cosmo-linker wrapper
        run: |
          cp cosmo-linker.sh "$COSMO/bin/cosmo-linker"
          chmod +x "$COSMO/bin/cosmo-linker"
          echo "$COSMO/bin" >> "$GITHUB_PATH"

      - name: Set up Rust (nightly + rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cosmo-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cosmo-cargo-

      - name: Build APE release binary
        run: |
          cargo +nightly build --release \
            -Zbuild-std=panic_abort,std \
            -Zbuild-std-features="" \
            --target ./x86_64-unknown-linux-cosmo.json

      - name: Strip debug info and produce final APE binary
        run: |
          objcopy -S \
            target/x86_64-unknown-linux-cosmo/release/spellr.com.dbg \
            spellr
          chmod +x spellr

      - name: Upload APE binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: spellr
          fail_on_unmatched_files: true
